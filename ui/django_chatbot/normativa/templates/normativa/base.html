{% load static %}
<!DOCTYPE html>
<html lang="es" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CANUTO — Asistente Normativo Unillanos{% endblock %}</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#C8102E', hover: '#A50D25' }
          }
        }
      }
    }
  </script>

  <style>
    /* Animación de los tres puntos al escribir */
    .typing-dot { animation: bounce 1s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }
    /* Scroll suave en áreas de chat */
    .chat-scroll { scroll-behavior: smooth; }
    /* Transición suave al abrir/cerrar widget */
    .widget-transition { transition: all 0.25s ease; }
  </style>

  {% block extra_head %}{% endblock %}
</head>

<body class="bg-gray-50 dark:bg-neutral-950 transition-colors duration-200">

  {% block content %}{% endblock %}

  <!-- Script para modo oscuro (persiste en localStorage) -->
  <script>
    function initTheme() {
      const saved = localStorage.getItem('canuto-theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.getElementById('html-root').classList.add('dark');
      }
    }
    function toggleTheme() {
      const html = document.getElementById('html-root');
      const isDark = html.classList.toggle('dark');
      localStorage.setItem('canuto-theme', isDark ? 'dark' : 'light');
      document.querySelectorAll('.theme-icon-moon').forEach(el => el.classList.toggle('hidden', isDark));
      document.querySelectorAll('.theme-icon-sun').forEach(el => el.classList.toggle('hidden', !isDark));
    }
    initTheme();
  </script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
