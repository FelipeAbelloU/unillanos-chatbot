# =============================================================================
# Asistente Normativo — Universidad de los Llanos
# Configuración principal
# =============================================================================

# Perfil de hardware activo: "laptop" o "workstation"
# El perfil sobrescribe las secciones relevantes de esta config.
hardware_profile: laptop

# --- Modelo fine-tuneado ---
model:
  # Ruta al checkpoint entrenado (formato HuggingFace: directorio con config.json, tokenizer, etc.)
  # Dejar vacío hasta que el entrenamiento esté completo.
  # Ejemplo: "models/checkpoint-500"  o ruta absoluta al directorio
  checkpoint_path: "data/checkpoints/unillanos-v1"
  device: cpu          # cpu | cuda
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9

# --- Extracción de texto desde PDFs ---
extraction:
  pdf_dir: "PDF"               # directorio con los PDFs fuente
  output_dir: "data/extracted" # dónde guardar los .txt extraídos
  ocr_engine: "easyocr"        # easyocr | tesseract

# --- Generación del dataset de fine-tuning ---
dataset:
  input_dir: "data/extracted"  # textos .txt de entrada
  output_dir: "data/dataset"   # dataset JSON de salida
  format: "alpaca"             # alpaca | sharegpt

# --- Chat conversacional ---
chat:
  max_history: 5
  system_prompt: |
    Eres un asistente de normativa universitaria de la Universidad de los Llanos (Unillanos), Colombia.
    Tu conocimiento proviene exclusivamente de resoluciones, acuerdos y documentos normativos de Unillanos.

    REGLAS OBLIGATORIAS:
    1. Responde siempre en español, con lenguaje claro y amigable, como si le explicaras a un estudiante.
    2. Si conoces con certeza el nombre y número de un documento (resolución, acuerdo, etc.), cítalo. Si no estás seguro del número exacto, NO lo menciones — es mejor omitirlo que inventarlo.
    3. Si la pregunta está fuera de tu conocimiento o no aparece en los documentos que conoces, responde exactamente: "No tengo información sobre eso en los documentos que conozco. Te recomiendo consultar directamente con la oficina correspondiente de Unillanos."
    4. Nunca inventes cifras, fechas, nombres de personas, valores de matrícula ni números de resoluciones.
    5. Si la respuesta tiene varios puntos, usa una lista numerada para que sea fácil de leer.
    6. Sé conciso: responde lo que se pregunta sin añadir información innecesaria.
